<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>灵蛇戏珠</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=ZCOOL+KuaiLe&family=Noto+Serif+SC:wght@400;700;900&display=swap');

  :root {
    --ink: #2c1810;
    --ink-light: #5a3a28;
    --paper: #f4e8d0;
    --paper-dark: #e8d5b0;
    --vermillion: #c23a2b;
    --vermillion-glow: rgba(194, 58, 43, 0.4);
    --gold: #c4943a;
    --gold-light: #e8c36a;
    --jade: #2d6b4f;
    --jade-light: #4a9e73;
    --cloud: rgba(244, 232, 208, 0.6);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--paper);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif SC', serif;
    overflow: hidden;
    position: relative;
  }

  /* Rice paper texture */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background-image:
      radial-gradient(ellipse at 20% 50%, rgba(200, 180, 140, 0.3) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 20%, rgba(180, 160, 120, 0.2) 0%, transparent 40%),
      radial-gradient(ellipse at 60% 80%, rgba(190, 170, 130, 0.25) 0%, transparent 45%);
    pointer-events: none;
    z-index: 0;
  }

  /* Ink wash corners */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background:
      radial-gradient(ellipse at 0% 0%, rgba(44, 24, 16, 0.08) 0%, transparent 30%),
      radial-gradient(ellipse at 100% 100%, rgba(44, 24, 16, 0.06) 0%, transparent 25%),
      radial-gradient(ellipse at 100% 0%, rgba(44, 24, 16, 0.04) 0%, transparent 20%);
    pointer-events: none;
    z-index: 0;
  }

  .game-wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 3.2rem;
    color: var(--ink);
    letter-spacing: 12px;
    position: relative;
    text-shadow: 2px 2px 0 rgba(244, 232, 208, 0.8);
  }

  .title::before {
    content: '~ ';
    color: var(--vermillion);
    font-size: 1.5rem;
    vertical-align: middle;
  }

  .title::after {
    content: ' ~';
    color: var(--vermillion);
    font-size: 1.5rem;
    vertical-align: middle;
  }

  .subtitle {
    font-family: 'Noto Serif SC', serif;
    font-size: 0.85rem;
    color: var(--ink-light);
    letter-spacing: 6px;
    margin-top: -8px;
    opacity: 0.6;
  }

  .hud {
    display: flex;
    gap: 50px;
    align-items: center;
  }

  .hud-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
  }

  .hud-label {
    font-size: 0.7rem;
    letter-spacing: 4px;
    color: var(--ink-light);
    opacity: 0.5;
  }

  .hud-value {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2.2rem;
    color: var(--ink);
    min-width: 60px;
    text-align: center;
    transition: transform 0.15s, color 0.15s;
  }

  .hud-value.best {
    color: var(--vermillion);
  }

  .hud-value.pop {
    transform: scale(1.3);
    color: var(--vermillion);
  }

  .canvas-container {
    position: relative;
    border: 3px solid var(--ink);
    border-radius: 2px;
    box-shadow:
      6px 6px 0 rgba(44, 24, 16, 0.1),
      inset 0 0 40px rgba(44, 24, 16, 0.05);
    background: var(--paper);
  }

  /* Corner ornaments using pseudo-elements on wrapper */
  .canvas-border {
    position: relative;
    padding: 12px;
    background: transparent;
  }

  .corner-ornament {
    position: absolute;
    width: 24px;
    height: 24px;
    border-color: var(--vermillion);
    border-style: solid;
    opacity: 0.7;
  }
  .corner-ornament.tl { top: 0; left: 0; border-width: 3px 0 0 3px; }
  .corner-ornament.tr { top: 0; right: 0; border-width: 3px 3px 0 0; }
  .corner-ornament.bl { bottom: 0; left: 0; border-width: 0 0 3px 3px; }
  .corner-ornament.br { bottom: 0; right: 0; border-width: 0 3px 3px 0; }

  canvas {
    display: block;
  }

  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: rgba(244, 232, 208, 0.92);
    backdrop-filter: blur(3px);
    transition: opacity 0.4s;
    z-index: 10;
  }

  .overlay.hidden {
    opacity: 0;
    pointer-events: none;
  }

  .overlay-title {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 2.6rem;
    margin-bottom: 8px;
  }

  .overlay-title.gameover {
    color: var(--vermillion);
  }

  .overlay-title.ready {
    color: var(--ink);
  }

  .overlay-sub {
    font-size: 1rem;
    color: var(--gold);
    letter-spacing: 3px;
    margin-bottom: 24px;
  }

  .overlay-score {
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 4rem;
    color: var(--ink);
    margin-bottom: 4px;
  }

  .overlay-score-label {
    font-size: 0.75rem;
    letter-spacing: 5px;
    color: var(--ink-light);
    opacity: 0.5;
    margin-bottom: 28px;
  }

  .btn {
    font-family: 'Noto Serif SC', serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 6px;
    padding: 12px 36px;
    border: 2px solid var(--ink);
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    transition: all 0.25s;
    position: relative;
  }

  .btn:hover {
    background: var(--vermillion);
    border-color: var(--vermillion);
    color: var(--paper);
    box-shadow: 4px 4px 0 rgba(44, 24, 16, 0.15);
    transform: translate(-1px, -1px);
  }

  .controls-hint {
    font-size: 0.75rem;
    color: var(--ink-light);
    letter-spacing: 2px;
    opacity: 0.4;
    margin-top: 8px;
  }

  /* Seal stamp */
  .seal {
    position: absolute;
    bottom: 16px;
    right: 16px;
    width: 44px;
    height: 44px;
    border: 2px solid var(--vermillion);
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Ma Shan Zheng', cursive;
    font-size: 1.2rem;
    color: var(--vermillion);
    opacity: 0.35;
    transform: rotate(-8deg);
    z-index: 2;
    pointer-events: none;
  }

  /* Mobile controls */
  .mobile-controls {
    display: none;
    gap: 6px;
    margin-top: 10px;
  }

  .d-btn {
    width: 56px;
    height: 56px;
    border: 2px solid var(--ink);
    background: rgba(244, 232, 208, 0.8);
    color: var(--ink);
    font-size: 1.2rem;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 2px;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }

  .d-btn:active {
    background: var(--vermillion);
    border-color: var(--vermillion);
    color: var(--paper);
  }

  .d-row { display: flex; justify-content: center; gap: 6px; }
  .d-spacer { width: 56px; height: 56px; }

  @media (max-width: 600px), (pointer: coarse) {
    .mobile-controls { display: flex; flex-direction: column; align-items: center; }
    .controls-hint { display: none; }
    .title { font-size: 2rem; letter-spacing: 6px; }
    .hud-value { font-size: 1.6rem; }
    .canvas-border { padding: 6px; }
  }
</style>
</head>
<body>

<div class="game-wrapper">
  <div class="title">灵蛇戏珠</div>
  <div class="subtitle">水墨丹青</div>

  <div class="hud">
    <div class="hud-item">
      <span class="hud-label">得分</span>
      <span class="hud-value" id="score">〇</span>
    </div>
    <div class="hud-item">
      <span class="hud-label">最高</span>
      <span class="hud-value best" id="best">〇</span>
    </div>
  </div>

  <div class="canvas-border">
    <div class="corner-ornament tl"></div>
    <div class="corner-ornament tr"></div>
    <div class="corner-ornament bl"></div>
    <div class="corner-ornament br"></div>
    <div class="canvas-container">
      <canvas id="game"></canvas>
      <div class="overlay" id="overlay">
        <div class="overlay-title ready" id="overlayTitle">蛇行天下</div>
        <div class="overlay-sub" id="overlaySub">方寸之间，灵动自如</div>
        <div class="overlay-score" id="overlayScore" style="display:none"></div>
        <div class="overlay-score-label" id="overlayScoreLabel" style="display:none"></div>
        <button class="btn" id="startBtn">开局</button>
      </div>
      <div class="seal">蛇</div>
    </div>
  </div>

  <div class="controls-hint">方向键 / WASD 控制方向</div>

  <div class="mobile-controls">
    <div class="d-row">
      <div class="d-spacer"></div>
      <div class="d-btn" data-dir="up">上</div>
      <div class="d-spacer"></div>
    </div>
    <div class="d-row">
      <div class="d-btn" data-dir="left">左</div>
      <div class="d-btn" data-dir="down">下</div>
      <div class="d-btn" data-dir="right">右</div>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const bestEl = document.getElementById('best');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlayTitle');
const overlaySub = document.getElementById('overlaySub');
const overlayScore = document.getElementById('overlayScore');
const overlayScoreLabel = document.getElementById('overlayScoreLabel');
const startBtn = document.getElementById('startBtn');

const CELL = 20;
const COLS = 25;
const ROWS = 25;
canvas.width = COLS * CELL;
canvas.height = ROWS * CELL;

// Chinese number conversion
const CN_NUMS = ['〇','一','二','三','四','五','六','七','八','九'];
function toCN(n) {
  if (n === 0) return '〇';
  if (n < 10) return CN_NUMS[n];
  if (n < 100) {
    const tens = Math.floor(n / 10);
    const ones = n % 10;
    let s = '';
    if (tens > 1) s += CN_NUMS[tens];
    s += '十';
    if (ones > 0) s += CN_NUMS[ones];
    return s;
  }
  return String(n);
}

let snake, dir, nextDir, food, score, best, running, speed, lastTime, particles, inkTrails;

best = parseInt(localStorage.getItem('cnSnakeBest') || '0');
bestEl.textContent = toCN(best);

// Colors
const INK = '#2c1810';
const INK_MED = 'rgba(44, 24, 16, 0.6)';
const INK_LIGHT = 'rgba(44, 24, 16, 0.15)';
const PAPER = '#f4e8d0';
const VERMILLION = '#c23a2b';
const GOLD = '#c4943a';
const JADE = '#2d6b4f';

function init() {
  const mid = Math.floor(COLS / 2);
  snake = [
    { x: mid, y: Math.floor(ROWS / 2) },
    { x: mid - 1, y: Math.floor(ROWS / 2) },
    { x: mid - 2, y: Math.floor(ROWS / 2) },
  ];
  dir = { x: 1, y: 0 };
  nextDir = { x: 1, y: 0 };
  score = 0;
  speed = 120;
  lastTime = 0;
  particles = [];
  inkTrails = [];
  scoreEl.textContent = '〇';
  placeFood();
}

function placeFood() {
  let pos;
  do {
    pos = { x: Math.floor(Math.random() * COLS), y: Math.floor(Math.random() * ROWS) };
  } while (snake.some(s => s.x === pos.x && s.y === pos.y));
  food = pos;
  // Randomly pick food type
  const types = ['pearl', 'peach', 'coin'];
  food.type = types[Math.floor(Math.random() * types.length)];
}

function spawnParticles(x, y) {
  const cx = x * CELL + CELL / 2;
  const cy = y * CELL + CELL / 2;
  // Ink splatter particles
  for (let i = 0; i < 10; i++) {
    const angle = (Math.PI * 2 / 10) * i + Math.random() * 0.6;
    const spd = 1 + Math.random() * 2.5;
    particles.push({
      x: cx, y: cy,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd,
      life: 1,
      decay: 0.015 + Math.random() * 0.025,
      size: 1.5 + Math.random() * 3,
      type: Math.random() > 0.5 ? 'ink' : 'vermillion',
    });
  }
}

function addInkTrail(x, y) {
  inkTrails.push({
    x: x * CELL + CELL / 2,
    y: y * CELL + CELL / 2,
    life: 1,
    decay: 0.003,
    size: 3 + Math.random() * 4,
  });
  if (inkTrails.length > 200) inkTrails.shift();
}

function update() {
  dir = { ...nextDir };
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

  if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS) return gameOver();
  if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

  snake.unshift(head);
  addInkTrail(head.x, head.y);

  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = toCN(score);
    scoreEl.classList.add('pop');
    setTimeout(() => scoreEl.classList.remove('pop'), 150);

    if (score > best) {
      best = score;
      bestEl.textContent = toCN(best);
      localStorage.setItem('cnSnakeBest', best);
    }

    spawnParticles(food.x, food.y);
    placeFood();
    if (speed > 55) speed -= 2;
  } else {
    snake.pop();
  }
}

function draw() {
  // Paper background
  ctx.fillStyle = PAPER;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Subtle paper grain noise
  ctx.globalAlpha = 0.03;
  for (let i = 0; i < 80; i++) {
    ctx.fillStyle = INK;
    ctx.fillRect(
      Math.random() * canvas.width,
      Math.random() * canvas.height,
      Math.random() * 2, Math.random() * 2
    );
  }
  ctx.globalAlpha = 1;

  // Ink trails (ink wash effect)
  for (const t of inkTrails) {
    ctx.globalAlpha = t.life * 0.08;
    ctx.fillStyle = INK;
    ctx.beginPath();
    ctx.arc(t.x, t.y, t.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Grid - faint brush strokes
  ctx.strokeStyle = 'rgba(44, 24, 16, 0.04)';
  ctx.lineWidth = 0.5;
  for (let x = 0; x <= COLS; x++) {
    ctx.beginPath();
    ctx.moveTo(x * CELL, 0);
    ctx.lineTo(x * CELL, canvas.height);
    ctx.stroke();
  }
  for (let y = 0; y <= ROWS; y++) {
    ctx.beginPath();
    ctx.moveTo(0, y * CELL);
    ctx.lineTo(canvas.width, y * CELL);
    ctx.stroke();
  }

  // Decorative mountains in background (ink wash style)
  ctx.globalAlpha = 0.035;
  ctx.fillStyle = INK;
  ctx.beginPath();
  ctx.moveTo(0, canvas.height);
  ctx.lineTo(0, canvas.height * 0.7);
  ctx.quadraticCurveTo(canvas.width * 0.15, canvas.height * 0.5, canvas.width * 0.25, canvas.height * 0.65);
  ctx.quadraticCurveTo(canvas.width * 0.35, canvas.height * 0.45, canvas.width * 0.5, canvas.height * 0.6);
  ctx.quadraticCurveTo(canvas.width * 0.65, canvas.height * 0.4, canvas.width * 0.75, canvas.height * 0.55);
  ctx.quadraticCurveTo(canvas.width * 0.9, canvas.height * 0.48, canvas.width, canvas.height * 0.6);
  ctx.lineTo(canvas.width, canvas.height);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;

  // Food
  const fx = food.x * CELL + CELL / 2;
  const fy = food.y * CELL + CELL / 2;
  const pulse = 0.85 + Math.sin(Date.now() * 0.005) * 0.15;

  ctx.save();
  // Glow aura
  const grad = ctx.createRadialGradient(fx, fy, 2, fx, fy, CELL * 1.5);
  if (food.type === 'pearl') {
    grad.addColorStop(0, 'rgba(196, 148, 58, 0.2)');
    grad.addColorStop(1, 'transparent');
  } else if (food.type === 'peach') {
    grad.addColorStop(0, 'rgba(194, 58, 43, 0.15)');
    grad.addColorStop(1, 'transparent');
  } else {
    grad.addColorStop(0, 'rgba(196, 148, 58, 0.2)');
    grad.addColorStop(1, 'transparent');
  }
  ctx.fillStyle = grad;
  ctx.fillRect(fx - CELL * 2, fy - CELL * 2, CELL * 4, CELL * 4);

  ctx.globalAlpha = pulse;
  ctx.font = `${CELL - 2}px serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (food.type === 'pearl') {
    // Draw a golden pearl
    ctx.fillStyle = GOLD;
    ctx.shadowColor = 'rgba(196, 148, 58, 0.6)';
    ctx.shadowBlur = 10;
    ctx.beginPath();
    ctx.arc(fx, fy, CELL / 2.5, 0, Math.PI * 2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(fx - 2, fy - 2, CELL / 7, 0, Math.PI * 2);
    ctx.fill();
  } else if (food.type === 'peach') {
    ctx.fillText('🍑', fx, fy + 1);
  } else {
    ctx.fillText('🪙', fx, fy + 1);
  }
  ctx.restore();

  // Snake body - ink brush style
  for (let i = snake.length - 1; i >= 0; i--) {
    const seg = snake[i];
    const px = seg.x * CELL;
    const py = seg.y * CELL;
    const t = 1 - i / Math.max(snake.length, 1);

    if (i === 0) {
      // Head - darker, larger, with character
      ctx.fillStyle = INK;
      ctx.shadowColor = 'rgba(44, 24, 16, 0.3)';
      ctx.shadowBlur = 6;
      const r = CELL / 2 - 1;
      ctx.beginPath();
      ctx.arc(px + CELL / 2, py + CELL / 2, r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      // Eyes - small red dots
      const hx = px + CELL / 2;
      const hy = py + CELL / 2;
      const eyeOff = 4;
      let e1, e2;
      if (dir.x === 1) { e1 = { x: hx + 4, y: hy - eyeOff }; e2 = { x: hx + 4, y: hy + eyeOff }; }
      else if (dir.x === -1) { e1 = { x: hx - 4, y: hy - eyeOff }; e2 = { x: hx - 4, y: hy + eyeOff }; }
      else if (dir.y === -1) { e1 = { x: hx - eyeOff, y: hy - 4 }; e2 = { x: hx + eyeOff, y: hy - 4 }; }
      else { e1 = { x: hx - eyeOff, y: hy + 4 }; e2 = { x: hx + eyeOff, y: hy + 4 }; }

      ctx.fillStyle = VERMILLION;
      ctx.beginPath();
      ctx.arc(e1.x, e1.y, 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(e2.x, e2.y, 2, 0, Math.PI * 2);
      ctx.fill();

      // Tiny forked tongue
      if (dir.x === 1) {
        drawTongue(hx + CELL/2 - 2, hy, 0);
      } else if (dir.x === -1) {
        drawTongue(hx - CELL/2 + 2, hy, Math.PI);
      } else if (dir.y === -1) {
        drawTongue(hx, hy - CELL/2 + 2, -Math.PI/2);
      } else {
        drawTongue(hx, hy + CELL/2 - 2, Math.PI/2);
      }
    } else {
      // Body segments - ink wash with varying opacity
      const alpha = 0.3 + t * 0.6;
      const size = CELL / 2 - 2 + t * 2;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = INK;
      ctx.beginPath();
      ctx.arc(px + CELL / 2, py + CELL / 2, size, 0, Math.PI * 2);
      ctx.fill();

      // Subtle scale pattern on every 3rd segment
      if (i % 3 === 0 && i < snake.length - 1) {
        ctx.globalAlpha = alpha * 0.3;
        ctx.strokeStyle = PAPER;
        ctx.lineWidth = 0.5;
        ctx.beginPath();
        ctx.arc(px + CELL / 2, py + CELL / 2, size * 0.5, 0, Math.PI);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }
  }

  // Draw connection between segments for smooth body
  ctx.strokeStyle = INK;
  ctx.lineCap = 'round';
  for (let i = 0; i < snake.length - 1; i++) {
    const a = snake[i];
    const b = snake[i + 1];
    const t = 1 - i / Math.max(snake.length, 1);
    ctx.globalAlpha = 0.3 + t * 0.5;
    ctx.lineWidth = (CELL / 2 - 2 + t * 2) * 1.6;
    ctx.beginPath();
    ctx.moveTo(a.x * CELL + CELL / 2, a.y * CELL + CELL / 2);
    ctx.lineTo(b.x * CELL + CELL / 2, b.y * CELL + CELL / 2);
    ctx.stroke();
  }
  ctx.globalAlpha = 1;

  // Particles (ink splatters)
  for (const p of particles) {
    ctx.globalAlpha = p.life * 0.7;
    ctx.fillStyle = p.type === 'ink' ? INK : VERMILLION;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;

  // Border decoration - thin vermillion line inside
  ctx.strokeStyle = 'rgba(194, 58, 43, 0.12)';
  ctx.lineWidth = 1;
  ctx.strokeRect(4, 4, canvas.width - 8, canvas.height - 8);
}

function drawTongue(x, y, angle) {
  const tongueWiggle = Math.sin(Date.now() * 0.02) * 0.3;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle + tongueWiggle);
  ctx.strokeStyle = VERMILLION;
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(5, -2);
  ctx.moveTo(0, 0);
  ctx.lineTo(5, 2);
  ctx.stroke();
  ctx.restore();
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vx *= 0.95;
    p.vy *= 0.95;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
  for (const t of inkTrails) {
    t.life -= t.decay;
  }
  inkTrails = inkTrails.filter(t => t.life > 0);
}

function gameOver() {
  running = false;
  overlayTitle.textContent = '落笔收官';
  overlayTitle.className = 'overlay-title gameover';
  overlaySub.textContent = score === best && score > 0 ? '新纪录！妙笔生花' : '再接再厉';
  overlayScore.style.display = 'block';
  overlayScore.textContent = toCN(score);
  overlayScoreLabel.style.display = 'block';
  overlayScoreLabel.textContent = '最终得分';
  startBtn.textContent = '再来一局';
  overlay.classList.remove('hidden');
}

function loop(ts) {
  if (!running) { draw(); updateParticles(); requestAnimationFrame(loop); return; }
  if (ts - lastTime >= speed) {
    lastTime = ts;
    update();
  }
  updateParticles();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  init();
  running = true;
  overlay.classList.add('hidden');
  lastTime = performance.now();
}

// Input
const dirMap = {
  ArrowUp: { x: 0, y: -1 }, ArrowDown: { x: 0, y: 1 },
  ArrowLeft: { x: -1, y: 0 }, ArrowRight: { x: 1, y: 0 },
  w: { x: 0, y: -1 }, s: { x: 0, y: 1 },
  a: { x: -1, y: 0 }, d: { x: 1, y: 0 },
  W: { x: 0, y: -1 }, S: { x: 0, y: 1 },
  A: { x: -1, y: 0 }, D: { x: 1, y: 0 },
};

document.addEventListener('keydown', e => {
  const d = dirMap[e.key];
  if (d && (d.x + dir.x !== 0 || d.y + dir.y !== 0)) {
    nextDir = d;
    e.preventDefault();
  }
  if (e.key === ' ' && !running) {
    startGame();
    e.preventDefault();
  }
});

// Mobile
const mDirMap = { up: { x: 0, y: -1 }, down: { x: 0, y: 1 }, left: { x: -1, y: 0 }, right: { x: 1, y: 0 } };
document.querySelectorAll('.d-btn').forEach(btn => {
  btn.addEventListener('touchstart', e => {
    e.preventDefault();
    const d = mDirMap[btn.dataset.dir];
    if (d && (d.x + dir.x !== 0 || d.y + dir.y !== 0)) nextDir = d;
  });
});

// Swipe
let touchStartX, touchStartY;
canvas.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
});
canvas.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;
  let d;
  if (Math.abs(dx) > Math.abs(dy)) d = dx > 0 ? { x: 1, y: 0 } : { x: -1, y: 0 };
  else d = dy > 0 ? { x: 0, y: 1 } : { x: 0, y: -1 };
  if (d.x + dir.x !== 0 || d.y + dir.y !== 0) nextDir = d;
});

startBtn.addEventListener('click', startGame);

init();
requestAnimationFrame(loop);
</script>
</body>
</html>
